<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位置・住所トラッカー (確定保存版)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: auto; padding: 30px; border-radius: 12px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .display-area { margin-top: 25px; padding: 15px; background: #fefefe; border-left: 4px solid #007bff; border-radius: 4px; }
        .info-block { margin-bottom: 15px; font-size: 0.95rem; min-height: 1.5em; }
        .address { font-size: 0.85rem; color: #666; font-style: italic; margin-top: 4px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 6px; }
        #startBtn { background-color: #28a745; color: white; }
        #startBtn:disabled { background-color: #ccc; cursor: not-allowed; }
        #stopBtn { background-color: #dc3545; color: white; }
        #stopBtn:disabled { background-color: #ccc; cursor: not-allowed; }
        #resetBtn { background-color: #6c757d; color: white; margin-top: 15px; font-size: 12px; padding: 5px 10px; }
        .result { font-weight: bold; color: #007bff; margin-top: 20px; padding-top: 15px; border-top: 2px solid #eee; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>位置・住所トラッカー</h2>
    <p>リロードしても状態を保持します（localStorage使用）</p>
    <button id="startBtn">開始</button>
    <button id="stopBtn" disabled>終了</button>
    <br>
    <button id="resetBtn">データをリセット</button>

    <div class="display-area">
        <div id="startTimeInfo" class="info-block"><strong>開始点：</strong> 未取得</div>
        <div id="stopTimeInfo" class="info-block"><strong>終了点：</strong> 未取得</div>
        <div id="resultInfo" class="result"></div>
    </div>
</div>

<script>
    // グローバル変数の宣言
    let startPos = null;
    let startTime = null;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const startTimeInfo = document.getElementById('startTimeInfo');
    const stopTimeInfo = document.getElementById('stopTimeInfo');
    const resultInfo = document.getElementById('resultInfo');

    const R = 6371; // 地球の半径(km)

    // 距離計算関数
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    // 住所取得関数
    async function getAddress(lat, lon) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`, {
                headers: { 'Accept-Language': 'ja' }
            });
            const data = await response.json();
            return data.display_name || "住所不明";
        } catch (e) { return "住所取得エラー"; }
    }

    // 位置情報取得関数
    function getPosition() {
        return new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, { 
                enableHighAccuracy: true, 
                timeout: 10000 
            });
        });
    }

    // --- 状態の復元処理 (ここが重要) ---
    function restoreState() {
        const saved = localStorage.getItem("tracking_data");
        if (saved) {
            const data = JSON.parse(saved);
            startPos = data.pos;
            startTime = new Date(data.time);
            
            startTimeInfo.innerHTML = `
                <strong>開始点：</strong> ${startTime.toLocaleTimeString()}<br>
                <div class="address">場所: ${data.address}</div>
            `;
            startBtn.disabled = true;
            stopBtn.disabled = false;
        }
    }

    // ページ読み込み時に即実行
    restoreState();

    // --- ボタンイベント ---

    startBtn.onclick = async () => {
        startBtn.disabled = true;
        startTimeInfo.innerHTML = "<strong>開始点：</strong> 取得中...";
        
        try {
            const position = await getPosition();
            startPos = { latitude: position.coords.latitude, longitude: position.coords.longitude };
            startTime = new Date();
            const address = await getAddress(startPos.latitude, startPos.longitude);

            // localStorageに保存
            const trackingData = {
                pos: startPos,
                time: startTime.toISOString(),
                address: address
            };
            localStorage.setItem("tracking_data", JSON.stringify(trackingData));

            startTimeInfo.innerHTML = `
                <strong>開始点：</strong> ${startTime.toLocaleTimeString()}<br>
                <div class="address">場所: ${address}</div>
            `;
            stopBtn.disabled = false;
        } catch (e) {
            alert("位置情報が取得できません。設定を確認してください。");
            startBtn.disabled = false;
            startTimeInfo.innerHTML = "<strong>開始点：</strong> 未取得";
        }
    };

    stopBtn.onclick = async () => {
        stopBtn.disabled = true;
        stopTimeInfo.innerHTML = "<strong>終了点：</strong> 取得中...";

        try {
            const position = await getPosition();
            const stopPos = position.coords;
            const stopTime = new Date();
            const address = await getAddress(stopPos.latitude, stopPos.longitude);

            stopTimeInfo.innerHTML = `
                <strong>終了点：</strong> ${stopTime.toLocaleTimeString()}<br>
                <div class="address">場所: ${address}</div>
            `;

            const diffMs = stopTime - startTime;
            const distance = calculateDistance(startPos.latitude, startPos.longitude, stopPos.latitude, stopPos.longitude);

            resultInfo.innerHTML = `
                移動距離: ${distance.toFixed(3)} km <br>
                経過時間: ${Math.floor(diffMs/60000)}分 ${Math.floor((diffMs%60000)/1000)}秒
            `;

            // 完了後はデータを消去
            localStorage.removeItem("tracking_data");
            startBtn.disabled = false;
        } catch (e) {
            alert("終了位置が取得できません。");
            stopBtn.disabled = false;
        }
    };

    resetBtn.onclick = () => {
        if(confirm("データをリセットしますか？")) {
            localStorage.removeItem("tracking_data");
            location.reload();
        }
    };
</script>

</body>

</html>
