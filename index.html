<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最大到達距離トラッカー</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f7f6; color: #333; }
        .container { max-width: 600px; margin: auto; padding: 25px; border-radius: 12px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; font-size: 1.4rem; display: flex; align-items: center; justify-content: space-between; }
        .status-badge { font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; background: #eee; font-weight: normal; }
        .card { margin-top: 20px; padding: 15px; background: #fcfcfc; border: 1px solid #edf2f7; border-radius: 8px; }
        .label { font-weight: bold; color: #4a5568; font-size: 0.9rem; display: block; margin-bottom: 4px; }
        .data-text { font-size: 1rem; margin-bottom: 12px; }
        .address { font-size: 0.85rem; color: #718096; font-style: normal; line-height: 1.4; }
        .result-panel { margin-top: 20px; padding: 20px; background: #ebf8ff; border-radius: 8px; border: 1px solid #bee3f8; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; font-size: 1.1rem; color: #2b6cb0; }
        button { padding: 14px 28px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; width: 48%; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 20px; }
        #startBtn { background-color: #38a169; color: white; }
        #stopBtn { background-color: #e53e3e; color: white; }
        button:disabled { background-color: #cbd5e0 !important; cursor: not-allowed; }
        #resetBtn { background: none; color: #a0aec0; border: 1px solid #e2e8f0; padding: 6px 12px; font-size: 0.8rem; margin-top: 20px; cursor: pointer; }
        .current-pos { font-size: 0.75rem; color: #a0aec0; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>距離トラッカー <span id="statusBadge" class="status-badge">停止中</span></h2>
    <div class="btn-group">
        <button id="startBtn">開始</button>
        <button id="stopBtn" disabled>終了</button>
    </div>

    <div class="card">
        <span class="label">【開始点】</span>
        <div id="startTimeText" class="data-text">-</div>
        <div id="startAddrText" class="address">-</div>
    </div>

    <div class="card">
        <span class="label">【終了点】</span>
        <div id="stopTimeText" class="data-text">-</div>
        <div id="stopAddrText" class="address">-</div>
    </div>

    <div class="result-panel">
        <div class="result-item"><span>移動距離</span><span><span id="distVal">0.000</span> km</span></div>
        <div class="result-item"><span>移動時間</span><span><span id="timeVal">0分 0秒</span></span></div>
    </div>
    <div id="currentPosText" class="current-pos">現在地：未取得</div>
    <center><button id="resetBtn">データをリセット</button></center>
</div>

<script>
    let watchId = null;
    let timerId = null;
    let wakeLock = null;
    let startTime = null;
    let startPos = null;
    let maxDistance = 0;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const distVal = document.getElementById('distVal');
    const timeVal = document.getElementById('timeVal');
    const statusBadge = document.getElementById('statusBadge');
    const startTimeText = document.getElementById('startTimeText');
    const startAddrText = document.getElementById('startAddrText');
    const stopTimeText = document.getElementById('stopTimeText');
    const stopAddrText = document.getElementById('stopAddrText');
    const currentPosText = document.getElementById('currentPosText');

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    async function getAddressData(lat, lon) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`, { headers: {'Accept-Language': 'ja'} });
            return await res.json();
        } catch (e) { return null; }
    }

    function formatAddress(data) {
        if (!data || !data.address) return "住所不明";
        const ad = data.address;
        const postCode = ad.postcode ? `〒${ad.postcode} ` : "";
        const state = ad.province || ad.state || "";
        const city = ad.city || ad.town || ad.village || ad.city_district || "";
        const suburb = ad.suburb || ad.neighbourhood || "";
        const road = ad.road || "";
        const houseNumber = ad.house_number ? ad.house_number : "";

        if (ad.country === "日本" || ad.country_code === "jp") {
            return `${postCode}${state}${city}${suburb}${road}${houseNumber}`;
        }
        return data.display_name.replace("日本, ", "");
    }

    function formatTimeDiff(ms) {
        const totalMinutes = Math.floor(ms / 60000);
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        const seconds = Math.floor((ms % 60000) / 1000);
        return hours > 0 ? `${hours}時間 ${minutes}分` : `${minutes}分 ${seconds}秒`;
    }

    function updateTimer() {
        if (!startTime) return;
        timeVal.innerText = formatTimeDiff(new Date() - startTime);
    }

    function startWatching() {
        watchId = navigator.geolocation.watchPosition((pos) => {
            const current = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            const currentDist = calculateDistance(startPos.lat, startPos.lon, current.lat, current.lon);
            if (currentDist > maxDistance) {
                maxDistance = currentDist;
                distVal.innerText = maxDistance.toFixed(3);
            }
            const saved = JSON.parse(localStorage.getItem("tracking_max_v2"));
            if (saved) { saved.maxDistance = maxDistance; localStorage.setItem("tracking_max_v2", JSON.stringify(saved)); }
            currentPosText.innerText = `現在地：緯度 ${current.lat.toFixed(4)} / 経度 ${current.lon.toFixed(4)}`;
        }, null, { enableHighAccuracy: true });
    }

    function restoreState() {
        const saved = localStorage.getItem("tracking_max_v2");
        if (saved) {
            const data = JSON.parse(saved);
            startTime = new Date(data.startTime);
            startPos = data.startPos;
            maxDistance = data.maxDistance || 0;
            distVal.innerText = maxDistance.toFixed(3);
            updateTimer();
            startTimeText.innerText = startTime.toLocaleString();
            startAddrText.innerText = data.startAddress;
            startBtn.disabled = true; stopBtn.disabled = false;
            statusBadge.innerText = "計測中"; statusBadge.style.background = "#38a169"; statusBadge.style.color = "white";
            startWatching(); timerId = setInterval(updateTimer, 1000);
        }
    }

    startBtn.onclick = async () => {
        startBtn.disabled = true;
        statusBadge.innerText = "取得中...";
        navigator.geolocation.getCurrentPosition(async (pos) => {
            startTime = new Date();
            startPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            maxDistance = 0;
            const addrData = await getAddressData(startPos.lat, startPos.lon);
            const address = formatAddress(addrData);

            localStorage.setItem("tracking_max_v2", JSON.stringify({
                startTime: startTime.toISOString(),
                startPos: startPos,
                maxDistance: 0,
                startAddress: address
            }));

            startTimeText.innerText = startTime.toLocaleString();
            startAddrText.innerText = address;
            if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            startWatching(); timerId = setInterval(updateTimer, 1000);
            stopBtn.disabled = false;
            statusBadge.innerText = "計測中"; statusBadge.style.background = "#38a169"; statusBadge.style.color = "white";
        });
    };

    stopBtn.onclick = () => {
        stopBtn.disabled = true;
        statusBadge.innerText = "終了処理中...";
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const stopTime = new Date();
            const addrData = await getAddressData(pos.coords.latitude, pos.coords.longitude);
            const address = formatAddress(addrData);

            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (timerId) clearInterval(timerId);
            if (wakeLock) wakeLock.release();
            
            stopTimeText.innerText = stopTime.toLocaleString();
            stopAddrText.innerText = address;
            timeVal.innerText = formatTimeDiff(stopTime - startTime);
            localStorage.removeItem("tracking_max_v2");
            statusBadge.innerText = "完了"; statusBadge.style.background = "#3182ce";
            startBtn.disabled = false;
        });
    };

    resetBtn.onclick = () => { if(confirm("リセットしますか？")) { localStorage.removeItem("tracking_max_v2"); location.reload(); } };
    restoreState();
</script>
</body>
</html>
