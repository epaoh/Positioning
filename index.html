<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位置・経路トラッカー (累積距離版)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: auto; padding: 30px; border-radius: 12px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .display-area { margin-top: 25px; padding: 15px; background: #fefefe; border-left: 4px solid #007bff; border-radius: 4px; }
        .info-block { margin-bottom: 10px; font-size: 0.95rem; }
        .address { font-size: 0.85rem; color: #666; font-style: italic; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 6px; margin-bottom: 10px; }
        #startBtn { background-color: #28a745; color: white; }
        #stopBtn { background-color: #dc3545; color: white; }
        #startBtn:disabled, #stopBtn:disabled { background-color: #ccc; cursor: not-allowed; }
        .result { font-weight: bold; color: #007bff; margin-top: 20px; padding: 15px; background: #e7f1ff; border-radius: 8px; }
        .status-badge { font-size: 0.8rem; padding: 2px 8px; border-radius: 10px; background: #eee; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>経路トラッカー <span id="statusBadge" class="status-badge">停止中</span></h2>
    <p>移動距離を積算するバージョン</p>
    <button id="startBtn">計測開始</button>
    <button id="stopBtn" disabled>計測終了</button>

    <div class="display-area">
        <div id="startTimeInfo" class="info-block"><strong>開始点：</strong> -</div>
        <div id="currentTimeInfo" class="info-block"><strong>現在地：</strong> -</div>
        <div id="resultInfo" class="result">
            走行距離: <span id="distVal">0.000</span> km<br>
            経過時間: <span id="timeVal">0分 0秒</span>
        </div>
    </div>
    <button id="resetBtn" style="background:none; color:gray; font-size:12px; border:1px solid #ccc; padding:5px;">全データをリセット</button>
</div>

<script>
    let watchId = null;
    let wakeLock = null;
    let startTime = null;
    let lastPos = null;
    let totalDistance = 0;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const distVal = document.getElementById('distVal');
    const timeVal = document.getElementById('timeVal');
    const statusBadge = document.getElementById('statusBadge');

    // 距離計算（ハバーシン公式）
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    // 住所取得
    async function getAddress(lat, lon) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`, { headers: {'Accept-Language': 'ja'} });
            const data = await res.json();
            return data.display_name;
        } catch (e) { return "住所取得エラー"; }
    }

    // 画面スリープ防止 (Wake Lock)
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) { console.error(`${err.name}, ${err.message}`); }
    }

    // 状態の復元
    function restoreState() {
        const saved = localStorage.getItem("tracking_v2");
        if (saved) {
            const data = JSON.parse(saved);
            startTime = new Date(data.startTime);
            totalDistance = data.totalDistance;
            lastPos = data.lastPos;
            
            distVal.innerText = totalDistance.toFixed(3);
            document.getElementById('startTimeInfo').innerHTML = `<strong>開始点：</strong> ${startTime.toLocaleTimeString()}<br><div class="address">${data.startAddress}</div>`;
            
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusBadge.innerText = "計測中";
            statusBadge.style.background = "#28a745";
            statusBadge.style.color = "white";
            
            startWatching();
            startTimeCounter();
        }
    }

    function startTimeCounter() {
        setInterval(() => {
            if (!startTime) return;
            const diff = new Date() - startTime;
            timeVal.innerText = `${Math.floor(diff/60000)}分 ${Math.floor((diff%60000)/1000)}秒`;
        }, 1000);
    }

    function startWatching() {
        watchId = navigator.geolocation.watchPosition(async (pos) => {
            const current = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            
            if (lastPos) {
                const d = calculateDistance(lastPos.lat, lastPos.lon, current.lat, current.lon);
                // 誤差対策: 5m以上移動した場合のみ加算
                if (d > 0.005) {
                    totalDistance += d;
                    distVal.innerText = totalDistance.toFixed(3);
                }
            }
            
            lastPos = current;
            
            // データの定期保存
            const currentData = JSON.parse(localStorage.getItem("tracking_v2"));
            if (currentData) {
                currentData.totalDistance = totalDistance;
                currentData.lastPos = lastPos;
                localStorage.setItem("tracking_v2", JSON.stringify(currentData));
            }

            document.getElementById('currentTimeInfo').innerHTML = `<strong>現在地：</strong> (緯度: ${current.lat.toFixed(5)}, 経度: ${current.lon.toFixed(5)})`;
        }, (err) => console.error(err), { enableHighAccuracy: true });
    }

    startBtn.onclick = async () => {
        startBtn.disabled = true;
        statusBadge.innerText = "取得中...";
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            startTime = new Date();
            lastPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            totalDistance = 0;
            const address = await getAddress(lastPos.lat, lastPos.lon);

            localStorage.setItem("tracking_v2", JSON.stringify({
                startTime: startTime.toISOString(),
                totalDistance: 0,
                lastPos: lastPos,
                startAddress: address
            }));

            document.getElementById('startTimeInfo').innerHTML = `<strong>開始点：</strong> ${startTime.toLocaleTimeString()}<br><div class="address">${address}</div>`;
            
            await requestWakeLock();
            startWatching();
            startTimeCounter();
            
            stopBtn.disabled = false;
            statusBadge.innerText = "計測中";
            statusBadge.style.background = "#28a745";
            statusBadge.style.color = "white";
        });
    };

    stopBtn.onclick = () => {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (wakeLock) wakeLock.release();
        
        localStorage.removeItem("tracking_v2");
        statusBadge.innerText = "完了";
        statusBadge.style.background = "#007bff";
        startBtn.disabled = false;
        stopBtn.disabled = true;
        alert(`計測を終了しました。\n総距離: ${totalDistance.toFixed(3)} km`);
    };

    resetBtn.onclick = () => {
        localStorage.removeItem("tracking_v2");
        location.reload();
    };

    restoreState();
</script>
</body>
</html>
