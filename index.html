<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最大到達距離トラッカー</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: auto; padding: 30px; border-radius: 12px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .display-area { margin-top: 25px; padding: 15px; background: #fefefe; border-left: 4px solid #007bff; border-radius: 4px; }
        .info-block { margin-bottom: 10px; font-size: 0.95rem; }
        .address { font-size: 0.85rem; color: #666; font-style: italic; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 6px; margin-bottom: 10px; }
        #startBtn { background-color: #28a745; color: white; }
        #stopBtn { background-color: #dc3545; color: white; }
        #startBtn:disabled, #stopBtn:disabled { background-color: #ccc; cursor: not-allowed; }
        .result { font-weight: bold; color: #007bff; margin-top: 20px; padding: 15px; background: #e7f1ff; border-radius: 8px; }
        .status-badge { font-size: 0.8rem; padding: 2px 8px; border-radius: 10px; background: #eee; margin-left: 10px; }
        .hint { font-size: 0.8rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>最大到達距離トラッカー <span id="statusBadge" class="status-badge">停止中</span></h2>
    <p class="hint">※距離を累積(逆戻りはカウントしない)</p>
    
    <button id="startBtn">計測開始</button>
    <button id="stopBtn" disabled>計測終了</button>

    <div class="display-area">
        <div id="startTimeInfo" class="info-block"><strong>開始点：</strong> -</div>
        <div id="currentTimeInfo" class="info-block"><strong>現在地：</strong> -</div>
        <div id="resultInfo" class="result">
            最大到達距離: <span id="distVal">0.000</span> km<br>
            経過時間: <span id="timeVal">0分 0秒</span>
        </div>
    </div>
    <button id="resetBtn" style="background:none; color:gray; font-size:11px; border:1px solid #ccc; padding:4px; margin-top:15px;">全データをリセット</button>
</div>

<script>
    let watchId = null;
    let timerId = null;
    let wakeLock = null;
    let startTime = null;
    let startPos = null; // 開始地点を固定保持
    let maxDistance = 0; // 最大到達距離

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const distVal = document.getElementById('distVal');
    const timeVal = document.getElementById('timeVal');
    const statusBadge = document.getElementById('statusBadge');

    // ハバーシン公式
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    async function getAddress(lat, lon) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`, { headers: {'Accept-Language': 'ja'} });
            const data = await res.json();
            return data.display_name;
        } catch (e) { return "住所取得エラー"; }
    }

    async function requestWakeLock() {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    }

    function updateTimerDisplay() {
        if (!startTime) return;
        const diff = new Date() - startTime;
        timeVal.innerText = `${Math.floor(diff / 60000)}分 ${Math.floor((diff % 60000) / 1000)}秒`;
    }

    // 監視メインロジック
    function startWatching() {
        watchId = navigator.geolocation.watchPosition((pos) => {
            const current = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            
            // 開始地点からの「現在の直線距離」を算出
            const currentDist = calculateDistance(startPos.lat, startPos.lon, current.lat, current.lon);
            
            // これまでの最大値を更新した場合のみ反映
            if (currentDist > maxDistance) {
                maxDistance = currentDist;
                distVal.innerText = maxDistance.toFixed(3);
            }
            
            // ローカルストレージに最新の最大値を保存（リロード対策）
            const saved = JSON.parse(localStorage.getItem("tracking_max_v1"));
            if (saved) {
                saved.maxDistance = maxDistance;
                localStorage.setItem("tracking_max_v1", JSON.stringify(saved));
            }

            document.getElementById('currentTimeInfo').innerHTML = 
                `<strong>現在地：</strong> (緯度: ${current.lat.toFixed(5)}, 経度: ${current.lon.toFixed(5)})`;
        }, null, { enableHighAccuracy: true });
    }

    function restoreState() {
        const saved = localStorage.getItem("tracking_max_v1");
        if (saved) {
            const data = JSON.parse(saved);
            startTime = new Date(data.startTime);
            startPos = data.startPos;
            maxDistance = data.maxDistance || 0;
            
            distVal.innerText = maxDistance.toFixed(3);
            updateTimerDisplay();
            document.getElementById('startTimeInfo').innerHTML = 
                `<strong>開始点：</strong> ${startTime.toLocaleTimeString()}<br><div class="address">${data.startAddress}</div>`;
            
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusBadge.innerText = "計測中";
            statusBadge.style.background = "#28a745";
            statusBadge.style.color = "white";
            
            startWatching();
            timerId = setInterval(updateTimerDisplay, 1000);
        }
    }

    startBtn.onclick = async () => {
        startBtn.disabled = true;
        statusBadge.innerText = "取得中...";
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            startTime = new Date();
            startPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            maxDistance = 0;
            const address = await getAddress(startPos.lat, startPos.lon);

            localStorage.setItem("tracking_max_v1", JSON.stringify({
                startTime: startTime.toISOString(),
                startPos: startPos,
                maxDistance: 0,
                startAddress: address
            }));

            document.getElementById('startTimeInfo').innerHTML = 
                `<strong>開始点：</strong> ${startTime.toLocaleTimeString()}<br><div class="address">${address}</div>`;
            
            await requestWakeLock();
            startWatching();
            timerId = setInterval(updateTimerDisplay, 1000);
            
            stopBtn.disabled = false;
            statusBadge.innerText = "計測中";
            statusBadge.style.background = "#28a745";
            statusBadge.style.color = "white";
        });
    };

    stopBtn.onclick = () => {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (timerId) clearInterval(timerId);
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        
        updateTimerDisplay();
        localStorage.removeItem("tracking_max_v1");
        
        statusBadge.innerText = "終了";
        statusBadge.style.background = "#007bff";
        startBtn.disabled = false;
        stopBtn.disabled = true;
    };

    resetBtn.onclick = () => {
        if(confirm("データをリセットしますか？")) {
            localStorage.removeItem("tracking_max_v1");
            location.reload();
        }
    };

    restoreState();
</script>
</body>
</html>
